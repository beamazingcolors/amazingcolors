<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Colors | Private Navigation & Chárter</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #04263a; /* Azul Marino Profundo (Fondo) */
            --accent: #f5841a;  /* Naranja Luxury (Logo/Acento) */
            --light: #0cb5d6;   /* Azul Claro (Acento Secundario) */
            --white: #ffffff;
            --gradient: linear-gradient(135deg, #f5841a 0%, #ffb347 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--primary); color: var(--white); font-family: 'Montserrat', sans-serif; line-height: 1.6; overflow-x: hidden; }

        /* Header con el logo y subtítulo actualizado */
        header { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(4, 38, 58, 0.85), rgba(4, 38, 58, 0.85)), url('https://raw.githubusercontent.com/beamazingcolors/amazingcolors/main/5x1-1.jpg') center/cover; padding: 20px; }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 3.5rem); letter-spacing: 4px; text-transform: uppercase; }
        
        /* Subtítulo de marca actualizado con Punch y sin la palabra prohibida */
        .header-subtitle { font-size: 1.1rem; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; margin-top: 10px; font-weight: 600; }

        /* Barra de Navegación */
        .nav-bar { position: sticky; top: 0; z-index: 100; background: rgba(4, 38, 58, 0.98); padding: 20px 0; border-bottom: 1px solid rgba(245, 132, 26, 0.2); display: flex; justify-content: center; gap: 40px; }
        .nav-btn { background: none; border: none; color: var(--white); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; opacity: 0.6; transition: 0.4s; padding: 10px 0; }
        .nav-btn.active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Cuadrícula del Catálogo */
        #catalog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 50px 8%; max-width: 1600px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px; overflow: hidden; cursor: pointer; transition: 0.4s; opacity: 0; transform: translateY(20px); }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover { border-color: var(--accent); transform: scale(1.02); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        
        /* Diseño de Imagen Profesional y Manejo de Error */
        .card img { width: 100%; height: 300px; object-fit: cover; background: #001524; display: block; transition: transform 0.3s; }
        .card img.no-img { object-fit: contain; padding: 40px; opacity: 0.3; }

        .card-info { padding: 25px; }
        .card-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 10px 0; letter-spacing: 1px; }
        .card-price { color: var(--accent); font-weight: 600; font-size: 1.1rem; }

        /* MODAL (Vista Detallada Luxury Cinema) */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 38, 58, 0.97); backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: var(--primary); border: 1px solid var(--accent); width: 100%; max-width: 1000px; max-height: 90vh; overflow-y: auto; position: relative; border-radius: 4px; }
        .modal-close { position: absolute; top: 20px; right: 20px; font-size: 2.5rem; color: var(--white); cursor: pointer; z-index: 10; line-height: 1; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
        
        /* Galería Vertical en Modal */
        .modal-gallery { display: flex; flex-direction: column; background: #000; }
        .modal-gallery img { width: 100%; height: auto; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .modal-details { padding: 50px; }
        .modal-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--white); margin-bottom: 20px; line-height: 1.1; }
        .modal-label { color: var(--accent); text-transform: uppercase; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; margin-top: 25px; display: block; }
        .modal-text { font-size: 0.95rem; color: #ccc; margin-bottom: 15px; font-weight: 300; }
        .modal-includes { background: rgba(12, 181, 214, 0.08); border-left: 3px solid var(--light); padding: 25px; margin: 25px 0; font-size: 0.9rem; color: #eee; }
        
        /* Botón de Reserva de WhatsApp */
        .btn-wa { display: block; width: 100%; text-align: center; background: var(--gradient); color: var(--primary); text-decoration: none; padding: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-top: 30px; transition: 0.3s; }
        .btn-wa:hover { filter: brightness(1.1); transform: translateY(-2px); }

        @media (max-width: 850px) {
            .modal-grid { grid-template-columns: 1fr; }
            .modal-details { padding: 30px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/beamazingcolors/amazingcolors/main/index.html" alt="Amazing Colors Logo" style="height: 60px; margin-bottom: 15px; onerror="this.style.display='none'">
        <h1>AMAZING COLORS</h1>
        <p class="header-subtitle">Elite Ocean Journeys</p>
    </header>

    <nav class="nav-bar">
        <button id="btnTour" class="nav-btn active" onclick="filter('tour')">Experiencias</button>
        <button id="btnYate" class="nav-btn" onclick="filter('yate')">Nuestra Flota</button>
    </nav>

    <main id="catalog-grid"></main>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-body" class="modal-grid"></div>
        </div>
    </div>

    <script>
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9f5_81pPWsXVaJ5uKaifOyjpmSprGKAzEkGh7qMSd5R83cV8UCJeqldoZIb5l3sN8kDEbFoC2NY0s/pub?gid=451869619&single=true&output=tsv';
        
        // CORRECCIÓN DE LA RUTA: beamazingcolors/amazingcolors
        const GITHUB_RAW = 'https://raw.githubusercontent.com/beamazingcolors/amazingcolors/main/';
        
        // Imagen de respaldo global genérica (logotipo con fondo oscuro)
        const BACKUP_IMG = 'https://raw.githubusercontent.com/beamazingcolors/amazingcolors/main/index.html';

        let fullData = [];

        async function init() {
            try {
                const response = await fetch(TSV_URL);
                const text = await response.text();
                const rows = text.replace(/\r/g, '').split('\n').filter(r => r.trim() !== '').map(r => r.split('\t'));
                const headers = rows[0].map(h => h.trim());
                fullData = rows.slice(1).map(row => {
                    let item = {};
                    headers.forEach((h, i) => {
                        let val = row[i]?.trim();
                        // LIMPIEZA PROFUNDA E INSENSIBLE A MAYÚSCULAS DE UNDEFINED
                        if (!val || val.toLowerCase() === 'undefined' || val.toLowerCase() === 'null') {
                            item[h] = '';
                        } else {
                            item[h] = val;
                        }
                    });
                    return item;
                });
                filter('tour'); 
            } catch (err) { console.error("Error al cargar datos", err); }
        }

        // Función inteligente para construir la URL de imagen de GitHub
        function getImgUrl(name, index = 1) {
            // Si el nombre está vacío o es un error, usar el marcador de posición
            if (!name || name === 'Experiencias' || name === '') return BACKUP_IMG;
            // Si ya es una liga completa, usarla directamente
            if (name.startsWith('http')) return name;
            // Concatenar y codificar el nombre del archivo de GitHub Raw. 
            // encodeURIComponent manejará espacios y caracteres especiales como el apóstrofe.
            let fileName = `${name.trim()}-${index}.jpg`;
            return GITHUB_RAW + encodeURIComponent(fileName);
        }

        function filter(category) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase().includes(category === 'tour' ? 'exp' : 'flota')));
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = '';
            
            // Filtrado flexible
            const items = fullData.filter(i => {
                const valorTipo = (i['TIPO'] || i['Tipo'] || i['Type'] || '').toLowerCase();
                return valorTipo.includes(category.toLowerCase());
            });

            if (items.length === 0) {
                grid.innerHTML = `<p style="text-align:center; width:100%; color: #ccc;">No se encontraron resultados para esta categoría.</p>`;
                return;
            }

            items.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(item.Nombre);
                
                // Mapeo dinámico y profesional
                const tagText = (item['Pies'] && item['Pies'] !== '') ? `${item['Pies']} Pies` : 'Selección Premium';
                // Si el precio no existe, mostramos "Consultar"
                const precioMostrado = (item['Precio'] && item['Precio'] !== '') ? item['Precio'] : 'Consultar';
                const imgUrl = getImgUrl(item.Nombre, 1);

                card.innerHTML = `
                    <img src="${imgUrl}" alt="${item.Nombre || 'Imagen'}" 
                         onerror="this.src='${BACKUP_IMG}'; this.classList.add('no-img');">
                    <div class="card-info">
                        <span style="color:var(--light); font-size:0.75rem; letter-spacing:2px; font-weight:600; text-transform:uppercase;">${tagText}</span>
                        <h2 class="card-title">${item.Nombre || 'Experiencia sin título'}</h2>
                        <p class="card-price">${precioMostrado}</p>
                    </div>
                `;
                grid.appendChild(card);
                // Animación de cascada
                setTimeout(() => card.classList.add('visible'), idx * 80);
            });
        }

        function openModal(nombre) {
            const item = fullData.find(i => i.Nombre === nombre);
            const body = document.getElementById('modal-body');
            // Asegurar que si los campos son nulos se muestre texto limpio y profesional
            const descriptivo = item['Descriptivo'] || item['Detalles'] || 'Ficha técnica de lujo disponible bajo solicitud.';
            const incluye = item['Incluye:'] || 'Servicio de Concierge personalizado incluido.';
            const precioModal = item['Precio'] || 'Consultar disponibilidad.';

            body.innerHTML = `
                <div class="modal-gallery">
                    <img src="${getImgUrl(item.Nombre, 1)}" onerror="this.src='${BACKUP_IMG}'; this.classList.add('no-img');">
                    <img src="${getImgUrl(item.Nombre, 2)}" onerror="this.src='${BACKUP_IMG}'; this.classList.add('no-img');">
                    <img src="${getImgUrl(item.Nombre, 3)}" onerror="this.src='${BACKUP_IMG}'; this.classList.add('no-img');">
                </div>
                <div class="modal-details">
                    <span class="modal-label">Propuesta Exclusiva</span>
                    <h1 class="modal-title">${item.Nombre || 'Experiencia'}</h1>
                    <p class="card-price" style="font-size:1.8rem;">${precioModal}</p>
                    
                    <span class="modal-label">La Experiencia</span>
                    <p class="modal-text">${descriptivo}</p>
                    
                    ${(item['Capacidad de personas'] && item['Capacidad de personas'] !== '') ? `<span class="modal-label">Capacidad de invitados</span><p class="modal-text">${item['Capacidad de personas']}</p>` : ''}
                    
                    <span class="modal-label">El servicio incluye</span>
                    <div class="modal-includes">${incluye}</div>
                    
                    <a href="https://wa.me/message/XIVP7QDJ5QKIP1" target="_blank" class="btn-wa">Reservar ahora</a>
                </div>
            `;
            document.getElementById('modal-overlay').style.display = 'flex';
            // Bloquea el scroll del fondo
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            // Restaura el scroll del fondo
            document.body.style.overflow = 'auto';
        }

        init();
    </script>
</body>
</html>
