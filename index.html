<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Colors | Elite Ocean Journeys</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #04263a; 
            --accent: #f5841a;  
            --light: #0cb5d6;
            --white: #ffffff;
            --gradient: linear-gradient(135deg, #f5841a 0%, #ffb347 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--primary); color: var(--white); font-family: 'Montserrat', sans-serif; line-height: 1.6; overflow-x: hidden; }

        header { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(4, 38, 58, 0.85), rgba(4, 38, 58, 0.85)), url('https://raw.githubusercontent.com/beamazingcolors/amazingcolors/main/5x1-1.jpg') center/cover; padding: 20px; }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 3.5rem); letter-spacing: 4px; text-transform: uppercase; }
        .header-subtitle { font-size: 1.1rem; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; margin-top: 10px; font-weight: 600; }

        .nav-bar { position: sticky; top: 0; z-index: 100; background: rgba(4, 38, 58, 0.98); padding: 20px 0; border-bottom: 1px solid rgba(245, 132, 26, 0.2); display: flex; justify-content: center; gap: 40px; }
        .nav-btn { background: none; border: none; color: var(--white); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; opacity: 0.6; transition: 0.4s; padding: 10px 0; }
        .nav-btn.active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }

        #catalog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 50px 8%; max-width: 1600px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px; overflow: hidden; transition: 0.4s; opacity: 0; transform: translateY(20px); cursor: pointer; }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover { border-color: var(--accent); transform: scale(1.02); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        
        .card img { width: 100%; height: 300px; object-fit: cover; background: #001524; display: block; }

        .card-info { padding: 25px; }
        .card-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 5px 0; letter-spacing: 1px; }
        .card-price { color: var(--accent); font-weight: 600; font-size: 1.1rem; }

        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 38, 58, 0.98); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: var(--primary); border: 1px solid var(--accent); width: 100%; max-width: 1000px; max-height: 90vh; overflow-y: auto; border-radius: 4px; position: relative; }
        .modal-close { position: absolute; top: 20px; right: 20px; font-size: 2.5rem; color: #fff; cursor: pointer; z-index: 10; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; }
        .modal-gallery { display: flex; flex-direction: column; background: #000; }
        .modal-gallery img { width: 100%; height: auto; display: block; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-details { padding: 50px; }
        .modal-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--white); margin-bottom: 20px; }
        .modal-label { color: var(--accent); text-transform: uppercase; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; margin-top: 25px; display: block; }
        .btn-wa { display: block; text-align: center; background: var(--gradient); color: var(--primary); text-decoration: none; padding: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-top: 30px; }

        @media (max-width: 850px) { .modal-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1>AMAZING COLORS</h1>
        <p class="header-subtitle">Elite Ocean Journeys</p>
    </header>

    <nav class="nav-bar">
        <button id="btnTour" class="nav-btn active" onclick="filter('tour')">Experiencias</button>
        <button id="btnYate" class="nav-btn" onclick="filter('yate')">Nuestra Flota</button>
    </nav>

    <main id="catalog-grid"></main>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-body" class="modal-grid"></div>
        </div>
    </div>

    <script>
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9f5_81pPWsXVaJ5uKaifOyjpmSprGKAzEkGh7qMSd5R83cV8UCJeqldoZIb5l3sN8kDEbFoC2NY0s/pub?gid=451869619&single=true&output=tsv';
        const GITHUB_RAW = 'https://raw.githubusercontent.com/beamazingcolors/amazingcolors/main/';

        let fullData = [];

        function getImgUrl(name, index = 1) {
            if (!name || name.toLowerCase() === 'undefined' || name === 'Experiencias' || name === '') return '';
            let fileName = name.trim();
            if (index > 0 && !fileName.includes('-')) {
                fileName = `${fileName}-${index}`;
            }
            if (!fileName.toLowerCase().endsWith('.jpg')) {
                fileName += '.jpg';
            }
            return GITHUB_RAW + encodeURIComponent(fileName);
        }

        async function init() {
            try {
                const response = await fetch(TSV_URL);
                const text = await response.text();
                const rows = text.replace(/\r/g, '').split('\n').filter(r => r.trim() !== '').map(r => r.split('\t'));
                const headers = rows[0].map(h => h.trim());
                
                fullData = rows.slice(1).map(row => {
                    let item = {};
                    headers.forEach((h, i) => {
                        let val = row[i]?.trim();
                        item[h] = (!val || val.toLowerCase() === 'undefined' || val.toLowerCase() === 'null') ? 'Experiencias' : val;
                    });
                    return item;
                });
                filter('tour');
            } catch (err) { console.error(err); }
        }

        function filter(category) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase().includes(category === 'tour' ? 'exp' : 'flota')));
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = '';
            
            const filtered = fullData.filter(i => (i['TIPO'] || '').toLowerCase().includes(category));

            filtered.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(item.Nombre);
                
                const img = getImgUrl(item.Nombre, 1);
                const tag = item['Pies'] !== 'Experiencias' ? item['Pies'] + ' Pies' : 'Selección Premium';
                
                let precio = item['Precio'] || 'Experiencias';
                if (precio.toLowerCase() === 'undefined' || precio.trim() === '') precio = 'Experiencias';

                card.innerHTML = `
                    <img src="${img}" onerror="this.style.display='none';">
                    <div class="card-info">
                        <span style="color:var(--light); font-size:0.75rem; font-weight:600; letter-spacing:2px; text-transform:uppercase;">${tag}</span>
                        <h2 class="card-title">${item.Nombre}</h2>
                        <p class="card-price">${precio}</p>
                    </div>
                `;
                grid.appendChild(card);
                setTimeout(() => card.classList.add('visible'), idx * 80);
            });
        }

        function openModal(nombre) {
            const item = fullData.find(i => i.Nombre === nombre);
            const body = document.getElementById('modal-body');
            
            let precio = item.Precio;
            if (!precio || precio.toLowerCase() === 'undefined' || precio.trim() === '') precio = 'Experiencias';

            let desc = item['Descriptivo'] !== 'Experiencias' ? item['Descriptivo'] : (item['Detalles'] !== 'Experiencias' ? item['Detalles'] : 'Experiencias');

            body.innerHTML = `
                <div class="modal-gallery">
                    <img src="${getImgUrl(item.Nombre, 1)}" onerror="this.remove();">
                    <img src="${getImgUrl(item.Nombre, 2)}" onerror="this.remove();">
                    <img src="${getImgUrl(item.Nombre, 3)}" onerror="this.remove();">
                </div>
                <div class="modal-details">
                    <span class="modal-label">Propuesta Exclusiva</span>
                    <h1 class="modal-title">${item.Nombre}</h1>
                    <p class="card-price" style="font-size:1.6rem;">${precio}</p>
                    
                    <span class="modal-label">Sobre la Experiencia</span>
                    <p style="font-size:0.9rem; color:#ccc;">${desc}</p>
                    
                    ${item['Capacidad de personas'] !== 'Experiencias' ? `<span class="modal-label">Capacidad</span><p>${item['Capacidad de personas']}</p>` : ''}
                    
                    <span class="modal-label">Incluye</span>
                    <div style="background:rgba(12,181,214,0.1); border-left:3px solid var(--light); padding:20px; font-size:0.85rem; margin-top:10px;">
                        ${item['Incluye:'] !== 'Experiencias' ? item['Incluye:'] : 'Servicio Premium de Concierge incluido.'}
                    </div>
                    
                    <a href="https://wa.me/message/XIVP7QDJ5QKIP1" target="_blank" class="btn-wa">Reservar ahora</a>
                </div>
            `;
            document.getElementById('modal-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        init();
    </script>
</body>
</html>
